<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rexz Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 50px 0;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .contact {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
        }
        button {
            background: #0072ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #005fcc;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Rexz Hub</h1>
            <p>Your Digital Hub</p>
        </header>
        
        <div class="contact">
            <h3>Kontak</h3>
            <button onclick="copyNumber('+62 822-4525-2901')">+62 822-4525-2901</button>
            <button onclick="copyNumber('+62 889-8920-8953')">+62 889-8920-8953</button>
            <p id="copyMsg" style="margin-top: 10px; color: #00ff00;"></p>
        </div>
        
        <footer>
            <p>&copy; 2025 Rexz Hub - For Educational Purpose</p>
        </footer>
    </div>
    
    <script>
        function copyNumber(phone) {
            navigator.clipboard.writeText(phone);
            document.getElementById('copyMsg').innerText = 'Nomor tersalin: ' + phone;
            setTimeout(() => {
                document.getElementById('copyMsg').innerText = '';
            }, 2000);
        }
    </script>
</body>
</html>
